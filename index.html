<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Wahyu Sahri Rhamadhan - Portfolio</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --cyan: #00d4ff;
      --cyan-dim: #00a8cc;
      --bg: #0a0e1a;
      --bg2: #0f1526;
      --bg3: #141c30;
      --card: #111827;
      --border: #1e2d45;
      --text: #e2e8f0;
      --muted: #64748b;
    }
    * { box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; margin: 0; }
    h1, h2, h3, .mono { font-family: 'Space Mono', monospace; }
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: var(--bg); }
    ::-webkit-scrollbar-thumb { background: var(--cyan-dim); border-radius: 2px; }

    /* NAVBAR */
    nav { position: fixed; top: 0; width: 100%; z-index: 100;
      background: rgba(10,14,26,0.9); backdrop-filter: blur(14px);
      border-bottom: 1px solid var(--border); }
    .nav-link { color: var(--muted); transition: color .2s; font-size: .875rem; }
    .nav-link:hover, .nav-link.active { color: var(--cyan); }

    /* HERO PARALLAX */
    #home {
      min-height: 100vh;
      position: relative;
      overflow: hidden;
      display: flex;
      align-items: center;
      padding-top: 4rem;
    }
    #parallax-bg {
      position: absolute; inset: 0; z-index: 0;
      background:
        radial-gradient(ellipse 70% 50% at 30% 50%, rgba(0,212,255,.07) 0%, transparent 65%),
        radial-gradient(ellipse 40% 60% at 80% 30%, rgba(0,150,255,.06) 0%, transparent 60%),
        var(--bg);
      will-change: transform;
    }
    /* Grid overlay */
    #parallax-bg::before {
      content: '';
      position: absolute; inset: 0;
      background-image:
        linear-gradient(rgba(0,212,255,.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,212,255,.04) 1px, transparent 1px);
      background-size: 60px 60px;
    }
    /* Floating orbs */
    .orb {
      position: absolute; border-radius: 50%;
      filter: blur(60px); opacity: 0.15;
      animation: float 8s ease-in-out infinite;
      pointer-events: none;
    }
    .orb1 { width: 400px; height: 400px; background: var(--cyan); top: 10%; left: 5%; animation-delay: 0s; }
    .orb2 { width: 300px; height: 300px; background: #0055ff; top: 60%; right: 10%; animation-delay: 3s; }
    .orb3 { width: 200px; height: 200px; background: var(--cyan); top: 30%; right: 30%; animation-delay: 6s; }
    @keyframes float {
      0%, 100% { transform: translateY(0) scale(1); }
      50% { transform: translateY(-30px) scale(1.05); }
    }

    /* Floating code snippets */
    .code-float {
      position: absolute; font-family: 'Space Mono', monospace; font-size: .65rem;
      color: rgba(0,212,255,.2); pointer-events: none; white-space: nowrap;
      animation: codeDrift 12s linear infinite;
    }
    @keyframes codeDrift {
      0% { transform: translateY(0) translateX(0); opacity: 0; }
      10% { opacity: 1; }
      90% { opacity: 1; }
      100% { transform: translateY(-120px) translateX(30px); opacity: 0; }
    }

    /* Binary rain column */
    .bin-col {
      position: absolute; top: 0; font-family: 'Space Mono', monospace;
      font-size: 10px; color: rgba(0,212,255,.12); line-height: 1.4;
      animation: binRain linear infinite; pointer-events: none;
    }
    @keyframes binRain {
      0% { transform: translateY(-100%); }
      100% { transform: translateY(110vh); }
    }

    .hero-inner { position: relative; z-index: 1; }
    .hero-name { font-size: clamp(2.2rem, 5.5vw, 4rem); line-height: 1.1; }
    .cyan { color: var(--cyan); }

    /* PHOTO */
    .photo-wrap {
      position: relative; width: 280px; height: 340px; flex-shrink: 0;
    }
    .photo-wrap::before {
      content: ''; position: absolute; inset: -8px;
      border: 2px solid var(--cyan); border-radius: 18px;
      opacity: .4; animation: photoPulse 3s ease-in-out infinite;
    }
    .photo-wrap::after {
      content: ''; position: absolute; inset: -16px;
      border: 1px solid var(--cyan); border-radius: 22px;
      opacity: .15; animation: photoPulse 3s ease-in-out infinite .5s;
    }
    @keyframes photoPulse {
      0%, 100% { opacity: .4; transform: scale(1); }
      50% { opacity: .15; transform: scale(1.02); }
    }
    .photo-img {
      width: 100%; height: 100%; object-fit: cover; object-position: top;
      border-radius: 14px; border: 2px solid rgba(0,212,255,.3);
      filter: brightness(1.05) contrast(1.05);
    }
    .photo-badge {
      position: absolute; bottom: -14px; left: 50%; transform: translateX(-50%);
      background: var(--cyan); color: #0a0e1a; font-family: 'Space Mono', monospace;
      font-size: .6rem; font-weight: 700; padding: .3rem .8rem; border-radius: 20px;
      white-space: nowrap;
    }

    /* BUTTONS */
    .btn-primary {
      background: var(--cyan); color: #0a0e1a; font-weight: 700;
      padding: .65rem 1.6rem; border-radius: 4px; font-size: .875rem;
      transition: opacity .2s, transform .15s; display: inline-block; cursor: pointer;
      font-family: 'Space Mono', monospace;
    }
    .btn-primary:hover { opacity: .85; transform: translateY(-1px); }
    .btn-outline {
      border: 1px solid var(--cyan); color: var(--cyan);
      padding: .65rem 1.6rem; border-radius: 4px; font-size: .875rem;
      transition: background .2s; display: inline-block; cursor: pointer;
      font-family: 'Space Mono', monospace;
    }
    .btn-outline:hover { background: rgba(0,212,255,.1); }

    /* STAT CARD */
    .stat-card { border: 1px solid var(--border); border-radius: 8px; padding: 1.5rem;
      background: var(--card); transition: border-color .2s; }
    .stat-card:hover { border-color: var(--cyan); }
    .stat-num { font-size: 2rem; font-weight: 700; color: var(--cyan); font-family: 'Space Mono', monospace; }

    /* SECTION */
    section { padding: 5rem 0; }
    .section-title { font-size: 1.75rem; margin-bottom: 2.5rem; }
    .section-title span { color: var(--cyan); }
    .divider { height: 1px; background: var(--border); margin: 0; }

    /* SKILL BAR */
    .skill-row { margin-bottom: .75rem; }
    .skill-label { font-size: .8rem; color: var(--text); margin-bottom: .3rem; display: flex; justify-content: space-between; }
    .bar-bg { background: var(--bg3); border-radius: 2px; height: 5px; }
    .bar-fill { background: linear-gradient(90deg, var(--cyan-dim), var(--cyan)); height: 100%; border-radius: 2px; transition: width 1.2s ease; width: 0; }

    /* TAGS */
    .tag { background: rgba(0,212,255,.08); border: 1px solid rgba(0,212,255,.2);
      color: var(--cyan); font-size: .7rem; padding: .2rem .55rem; border-radius: 3px;
      font-family: 'Space Mono', monospace; }
    .tag-gray { background: var(--bg3); border: 1px solid var(--border);
      color: var(--muted); font-size: .7rem; padding: .2rem .55rem; border-radius: 3px; }

    /* GENERIC CARD */
    .card { background: var(--card); border: 1px solid var(--border); border-radius: 10px;
      padding: 1.5rem; transition: border-color .25s, transform .2s; }
    .card:hover { border-color: var(--cyan); transform: translateY(-3px); }

    /* PROJECT LOGO */
    .proj-logo {
      width: 48px; height: 48px; border-radius: 10px; object-fit: cover;
      border: 1px solid var(--border); flex-shrink: 0;
      background: var(--bg3);
    }
    .proj-logo-fallback {
      width: 48px; height: 48px; border-radius: 10px;
      background: rgba(0,212,255,.1); border: 1px solid rgba(0,212,255,.2);
      display: flex; align-items: center; justify-content: center;
      font-size: 1.4rem; flex-shrink: 0;
    }

    /* CERT/TRAINING LOGO */
    .cert-logo {
      width: 52px; height: 52px; border-radius: 10px; object-fit: contain;
      padding: 4px; background: white; border: 1px solid var(--border); flex-shrink: 0;
    }
    .cert-logo-fallback {
      width: 52px; height: 52px; border-radius: 10px;
      background: rgba(0,212,255,.1); border: 1px solid rgba(0,212,255,.2);
      display: flex; align-items: center; justify-content: center;
      font-size: 1.6rem; flex-shrink: 0;
    }

    /* CONTACT */
    .input-field {
      background: var(--bg3); border: 1px solid var(--border); color: var(--text);
      border-radius: 6px; padding: .65rem 1rem; width: 100%; font-size: .875rem;
      outline: none; transition: border-color .2s; font-family: 'DM Sans', sans-serif;
    }
    .input-field:focus { border-color: var(--cyan); }

    /* MOBILE MENU */
    #mobile-menu { display: none; }
    #mobile-menu.open { display: flex; }

    /* FADE-UP */
    @keyframes fadeUp { from { opacity:0; transform: translateY(24px); } to { opacity:1; transform: none; } }
    .fade-up { animation: fadeUp .6s ease both; }

    @media (max-width: 768px) {
      .photo-wrap { width: 200px; height: 250px; }
    }
  </style>
</head>

    <div class="grid md:grid-cols-2 lg:grid-cols-3 gap-4" id="cert-list"></div>

</section>

<!-- TRAINING -->
<section id="training">
  <div class="max-w-6xl mx-auto px-6">

    <div class="grid md:grid-cols-2 lg:grid-cols-3 gap-4" id="training-list"></div>

// RENDER ENGINE

// Photo
document.getElementById('hero-photo').src = PHOTO_VAR;
document.getElementById('hero-badge').textContent = DATA.hero.badge;

// Navbar
const navLinks = document.getElementById('nav-links');
const mobileMenu = document.getElementById('mobile-menu');
DATA.nav.forEach(item => {
  const id = item.toLowerCase();
  const a = document.createElement('a');
  a.href = `#${id}`; a.className = 'nav-link'; a.textContent = item;
  navLinks.appendChild(a);
  const mob = a.cloneNode(true);
  mob.className = 'nav-link py-2 border-b border-[var(--border)] text-sm';
  mobileMenu.appendChild(mob);
});
document.getElementById('burger').addEventListener('click', () => mobileMenu.classList.toggle('open'));

// Hero text
document.getElementById('hero-name').innerHTML = DATA.hero.name.replace('\n', '<br>');
document.getElementById('hero-subtitle').textContent = DATA.hero.subtitle;
document.getElementById('hero-desc').textContent = DATA.hero.desc;
const statsEl = document.getElementById('hero-stats');
DATA.hero.stats.forEach(s => {
  statsEl.innerHTML += `<div class="stat-card">
    <div class="stat-num">${s.num}</div>
    <div class="text-[var(--muted)] text-sm mt-1">${s.label}</div>
  </div>`;
});

// Skill bars
const sgEl = document.getElementById('skill-groups');
DATA.skillGroups.forEach(g => {
  const bars = g.items.map(i => `
    <div class="skill-row">
      <div class="skill-label"><span>${i.label}</span><span class="cyan text-xs">${i.pct}%</span></div>
      <div class="bar-bg"><div class="bar-fill" data-pct="${i.pct}"></div></div>
    </div>`).join('');
  sgEl.innerHTML += `<div class="card"><h3 class="mono text-sm cyan mb-4">${g.name}</h3>${bars}</div>`;
});

// Animate skill bars on scroll
const animateBars = () => {
  document.querySelectorAll('.bar-fill[data-pct]').forEach(el => {
    const rect = el.closest('.card').getBoundingClientRect();
    if (rect.top < window.innerHeight - 60) {
      el.style.width = el.dataset.pct + '%';
      el.removeAttribute('data-pct');
    }
  });
};
window.addEventListener('scroll', animateBars);
animateBars();

// Experience
const expEl = document.getElementById('experience-list');
DATA.experience.forEach(e => {
  const tags = e.tags.map(t => `<span class="tag">${t}</span>`).join('');
  expEl.innerHTML += `<div class="card">
    <div class="flex flex-wrap items-start justify-between gap-2 mb-2">
      <div>
        <h3 class="font-semibold text-base">${e.role}</h3>
        <p class="cyan text-sm mono">${e.company}</p>
      </div>
      <div class="text-right">
        <span class="text-[var(--muted)] text-xs mono">${e.period}</span>
        <div class="tag-gray mt-1 inline-block">${e.type}</div>
      </div>
    </div>
    <p class="text-[var(--muted)] text-sm mb-3">${e.desc}</p>
    <div class="flex flex-wrap gap-2">${tags}</div>
  </div>`;
});

// Helper: logo img with fallback
function logoImg(logoUrl, fallbackEmoji, cls) {
  if (logoUrl) {
    return `<img src="${logoUrl}" class="${cls}" onerror="this.style.display='none';this.nextElementSibling.style.display='flex';" />
            <div class="${cls.replace('cert-logo','cert-logo-fallback').replace('proj-logo','proj-logo-fallback')}" style="display:none">${fallbackEmoji}</div>`;
  }
  const fallbackCls = cls.includes('proj') ? 'proj-logo-fallback' : 'cert-logo-fallback';
  return `<div class="${fallbackCls}">${fallbackEmoji}</div>`;
}

// Active nav
const sections = document.querySelectorAll('section[id]');
const obs = new IntersectionObserver(entries => {
  entries.forEach(e => {
    if (e.isIntersecting) {
      document.querySelectorAll('.nav-link').forEach(a => a.classList.remove('active'));
      document.querySelectorAll(`.nav-link[href="#${e.target.id}"]`).forEach(a => a.classList.add('active'));
    }
  });
}, { threshold: 0.3 });
sections.forEach(s => obs.observe(s));

// Parallax scroll
window.addEventListener('scroll', () => {
  const y = window.scrollY;
  document.getElementById('parallax-bg').style.transform = `translateY(${y * 0.3}px)`;
});

// Binary rain
const rainContainer = document.getElementById('bin-rain-container');
for (let i = 0; i < 18; i++) {
  const col = document.createElement('div');
  col.className = 'bin-col';
  col.style.left = (Math.random() * 100) + '%';
  col.style.animationDuration = (8 + Math.random() * 10) + 's';
  col.style.animationDelay = (Math.random() * 8) + 's';
  let txt = '';
  for (let j = 0; j < 30; j++) txt += (Math.random() > .5 ? '1' : '0') + '\n';
  col.textContent = txt;
  rainContainer.appendChild(col);
}

// Floating code snippets
const codeFloats = document.getElementById('code-floats-container');
const snippets = [
  'php artisan migrate', 'git push origin main', 'docker-compose up -d',
  'SELECT * FROM users;', 'terraform apply', 'npm run build',
  'kubectl get pods', 'redis-cli PING', 'git status',
];
snippets.forEach((snip, i) => {
  const el = document.createElement('div');
  el.className = 'code-float';
  el.textContent = '> ' + snip;
  el.style.left = (5 + Math.random() * 80) + '%';
  el.style.top = (20 + Math.random() * 60) + '%';
  el.style.animationDuration = (10 + Math.random() * 8) + 's';
  el.style.animationDelay = (i * 2) + 's';
  codeFloats.appendChild(el);
});
